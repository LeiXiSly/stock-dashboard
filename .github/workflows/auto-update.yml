name: 每日自动更新股票数据

on:
  schedule:
    # 每个交易日 15:10 执行（北京时间 23:10，美股时间 15:10）
    - cron: '10 7 * * 1-5'  # 周一到周五 07:10 UTC = 15:10 北京
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update-stock-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 运行更新脚本
        run: |
          python update_stock_data.py
      
      - name: 提交更改
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          if git diff --staged --quiet; then
            echo "没有数据变化，跳过提交"
          else
            git commit -m "📊 自动更新股票数据 $(date +%Y-%m-%d)"
            git push
          fi
